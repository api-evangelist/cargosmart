apis:
  - aid: cargosmart:cargosmart-container-booking-api
    name: CargoSmart Container Booking API
    tags:
      - Maritime
      - Container
      - Booking
      - Shipping
      - Logistics
      - Ocean Freight
    image: 
      https://raw.githubusercontent.com/api-evangelist/cargosmart/refs/heads/main/image.png
    humanURL: https://www.cargosmart.com/
    baseURL: https://api.cargosmart.com
    properties:
      - url: https://www.cargosmart.com/
        type: Documentation
      - url: 
          https://raw.githubusercontent.com/api-evangelist/cargosmart/refs/heads/main/openapi/cargosmart-shipment-tracking-openapi.yml
        type: OpenAPI
    description: >-
      The CargoSmart Container Booking API enables programmatic submission of container
      booking requests across multiple ocean carriers. APIs support booking creation,
      amendment, cancellation, and confirmation workflows for shippers, NVOCCs, and
      logistics service providers.

  - aid: cargosmart:cargosmart-shipment-tracking-api
    name: CargoSmart Shipment Tracking API
    tags:
      - Maritime
      - Container
      - Tracking
      - Visibility
      - Shipping
      - Logistics
    image: 
      https://raw.githubusercontent.com/api-evangelist/cargosmart/refs/heads/main/image.png
    humanURL: https://www.cargosmart.com/
    baseURL: https://api.cargosmart.com
    properties:
      - url: https://www.cargosmart.com/
        type: Documentation
      - url: 
          https://raw.githubusercontent.com/api-evangelist/cargosmart/refs/heads/main/openapi/cargosmart-shipment-tracking-openapi.yml
        type: OpenAPI
      - url: 
          https://raw.githubusercontent.com/api-evangelist/cargosmart/refs/heads/main/asyncapi/cargosmart-events-asyncapi.yml
        type: AsyncAPI
    description: >-
      The CargoSmart Shipment Tracking API provides real-time container tracking and
      shipment visibility across ocean carriers and ports. APIs return container movement
      events, vessel positions, ETA predictions, and port arrival/departure data for
      supply chain visibility platforms.

  - aid: cargosmart:cargosmart-vessel-schedule-api
    name: CargoSmart Vessel Schedule API
    tags:
      - Maritime
      - Vessel
      - Schedule
      - Shipping
      - Port
      - Logistics
    image: 
      https://raw.githubusercontent.com/api-evangelist/cargosmart/refs/heads/main/image.png
    humanURL: https://www.cargosmart.com/
    baseURL: https://api.cargosmart.com
    properties:
      - url: https://www.cargosmart.com/
        type: Documentation
      - url: 
          https://raw.githubusercontent.com/api-evangelist/cargosmart/refs/heads/main/openapi/cargosmart-shipment-tracking-openapi.yml
        type: OpenAPI
    description: >-
      The CargoSmart Vessel Schedule API provides access to ocean carrier vessel schedules,
      port rotation data, and sailing frequency information. APIs support route planning,
      transit time calculation, and carrier selection for ocean freight shippers and
      forwarders.

  - aid: cargosmart:cargosmart-shipping-documents-api
    name: CargoSmart Shipping Documentation API
    tags:
      - Maritime
      - Container
      - Documentation
      - Bill of Lading
      - EDI
      - Shipping
    image: 
      https://raw.githubusercontent.com/api-evangelist/cargosmart/refs/heads/main/image.png
    humanURL: https://www.cargosmart.com/
    baseURL: https://api.cargosmart.com
    properties:
      - url: https://www.cargosmart.com/
        type: Documentation
      - url: 
          https://raw.githubusercontent.com/api-evangelist/cargosmart/refs/heads/main/openapi/cargosmart-shipment-tracking-openapi.yml
        type: OpenAPI
    description: >-
      The CargoSmart Shipping Documentation API enables electronic exchange of shipping
      documents including bills of lading, cargo manifests, and customs declarations.
      APIs and EDI integrations support paperless documentation workflows across carriers,
      ports, customs authorities, and logistics service providers.

