apis:
  - aid: cargosmart:cargosmart-container-booking-api
    name: CargoSmart Container Booking API
    description: >-
      The CargoSmart Container Booking API enables programmatic
      submission of container booking requests across multiple ocean
      carriers. APIs support booking creation, amendment,
      cancellation, and confirmation workflows for shippers, NVOCCs,
      and logistics service providers.
    humanURL: https://www.cargosmart.com/
    baseURL: https://api.cargosmart.com
