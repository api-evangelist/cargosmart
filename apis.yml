  - aid: cargosmart:cargosmart-shipping-documents-api
    name: CargoSmart Shipping Documentation API
    description: >-
      The CargoSmart Shipping Documentation API enables electronic
      exchange of shipping documents including bills of lading, cargo
      manifests, and customs declarations. APIs and EDI integrations
      support paperless documentation workflows across carriers,
      ports, customs authorities, and logistics service providers.
