name: CargoSmart
description: >-
  CargoSmart (now operating as IQAX) is a global shipment management
  software provider that gives shippers, consignees, freight
  forwarders, and logistics service providers ocean freight booking,
  container tracking, vessel scheduling, and shipping documentation
  tools across multiple ocean carriers. CargoSmart co-founded the
  Global Shipping Business Network (GSBN), a blockchain-based data
  exchange for carriers, terminals, banks, and customs authorities,
  and exposes its APIs so trading partners can embed booking,
  visibility, schedule, and documentation workflows directly into
  TMS, ERP, and supply-chain platforms.
