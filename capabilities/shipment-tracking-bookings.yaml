naftiko: 1.0.0-alpha2
info:
  label: CargoSmart Shipment Tracking API — Bookings
  description: 'CargoSmart Shipment Tracking API — Bookings. 2 operations. Lead operation: Create container booking. Self-contained
    Naftiko capability covering one Cargosmart business surface.'
  tags:
  - Cargosmart
  - Bookings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CARGOSMART_API_KEY: CARGOSMART_API_KEY
capability:
  consumes:
  - type: http
    namespace: shipment-tracking-bookings
    baseUri: https://api.cargosmart.com
    description: CargoSmart Shipment Tracking API — Bookings business capability. Self-contained, no shared references.
    resources:
    - name: bookings-v1
      path: /bookings/v1
      operations:
      - name: createbooking
        method: POST
        description: Create container booking
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listbookings
        method: GET
        description: List bookings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: carrierId
          in: query
          type: string
        - name: fromDate
          in: query
          type: string
        - name: toDate
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CARGOSMART_API_KEY}}'
  exposes:
  - type: rest
    namespace: shipment-tracking-bookings-rest
    port: 8080
    description: REST adapter for CargoSmart Shipment Tracking API — Bookings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bookings/v1
      name: bookings-v1
      description: REST surface for bookings-v1.
      operations:
      - method: POST
        name: createbooking
        description: Create container booking
        call: shipment-tracking-bookings.createbooking
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listbookings
        description: List bookings
        call: shipment-tracking-bookings.listbookings
        with:
          status: rest.status
          carrierId: rest.carrierId
          fromDate: rest.fromDate
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shipment-tracking-bookings-mcp
    port: 9090
    transport: http
    description: MCP adapter for CargoSmart Shipment Tracking API — Bookings. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-container-booking
      description: Create container booking
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: shipment-tracking-bookings.createbooking
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-bookings
      description: List bookings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: shipment-tracking-bookings.listbookings
      with:
        status: tools.status
        carrierId: tools.carrierId
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
