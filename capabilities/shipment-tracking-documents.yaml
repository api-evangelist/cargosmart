naftiko: 1.0.0-alpha2
info:
  label: CargoSmart Shipment Tracking API — Documents
  description: 'CargoSmart Shipment Tracking API — Documents. 1 operations. Lead operation: Get bill of lading. Self-contained
    Naftiko capability covering one Cargosmart business surface.'
  tags:
  - Cargosmart
  - Documents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CARGOSMART_API_KEY: CARGOSMART_API_KEY
capability:
  consumes:
  - type: http
    namespace: shipment-tracking-documents
    baseUri: https://api.cargosmart.com
    description: CargoSmart Shipment Tracking API — Documents business capability. Self-contained, no shared references.
    resources:
    - name: documents-v1-bills-of-lading-blNumber
      path: /documents/v1/bills-of-lading/{blNumber}
      operations:
      - name: getbilloflading
        method: GET
        description: Get bill of lading
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: blNumber
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.CARGOSMART_API_KEY}}'
  exposes:
  - type: rest
    namespace: shipment-tracking-documents-rest
    port: 8080
    description: REST adapter for CargoSmart Shipment Tracking API — Documents. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/documents/v1/bills-of-lading/{blnumber}
      name: documents-v1-bills-of-lading-blnumber
      description: REST surface for documents-v1-bills-of-lading-blNumber.
      operations:
      - method: GET
        name: getbilloflading
        description: Get bill of lading
        call: shipment-tracking-documents.getbilloflading
        with:
          blNumber: rest.blNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shipment-tracking-documents-mcp
    port: 9090
    transport: http
    description: MCP adapter for CargoSmart Shipment Tracking API — Documents. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-bill-lading
      description: Get bill of lading
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: shipment-tracking-documents.getbilloflading
      with:
        blNumber: tools.blNumber
      outputParameters:
      - type: object
        mapping: $.
