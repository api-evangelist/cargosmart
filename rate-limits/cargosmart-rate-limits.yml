specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: CargoSmart
providerId: cargosmart
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Logistics
  - Ocean Freight
  - Shipping
  - Rate Limiting
description: CargoSmart does not publish public rate-limit numbers for its container-tracking, booking,
  schedule, or documentation APIs. Limits are configured per enterprise contract and are typically dimensioned
  by tracked container volume rather than raw request rate.
notes: No public rate-limit documentation found on the CargoSmart/IQAX site. Treat as enterprise-contract-defined.
sources:
  - https://www.cargosmart.com/
  - https://www.iqax.com/
responseCodes:
  throttled: 429
limits:
  - name: Per-customer contract limit
    scope: customer
    metric: varies
    limit: see enterprise agreement
policies:
  - name: Polling cadence
    description: Container tracking and vessel schedule APIs reward periodic polling rather than burst
      reads; align polling intervals with the change frequency of the underlying carrier feeds.
  - name: Backoff strategy
    description: Implement exponential backoff with jitter on 429 responses; coordinate batch booking
      windows with the CargoSmart/IQAX technical contact.
  - name: Authentication scoping
    description: Each customer/partner uses scoped API credentials; rate caps are enforced per credential.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
