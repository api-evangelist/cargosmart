description: CargoSmart (now operating as IQAX) is a B2B shipment-management platform sold as enterprise
  software to shippers, consignees, freight forwarders, and logistics service providers. APIs (Container
  Booking, Tracking, Vessel Schedule, Documentation) are accessed under enterprise commercial agreements;
  pricing is not published publicly.
notes: No public API pricing page found. CargoSmart/IQAX sells via direct enterprise sales; reconcile
  against the customer's specific commercial agreement.
sources:
  - https://www.cargosmart.com/
  - https://www.iqax.com/
plans:
  - id: cargosmart-enterprise
    name: CargoSmart / IQAX Enterprise
    type: enterprise
    description: Enterprise license covering booking, container tracking, vessel schedule, and documentation
      APIs across the IQAX platform and GSBN-connected workflows.
    entries:
      - label: Enterprise license
        name: enterprise_license
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Tracked container volume
        name: container_volume
        type: metered
        metric: container
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: CargoSmart Container Booking API
      - name: CargoSmart Container Tracking
      - name: CargoSmart Vessel Schedule
      - name: CargoSmart Shipping Documentation
      - name: GSBN Connectivity
